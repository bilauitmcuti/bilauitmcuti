name: PR base to preview

on:
  pull_request:
    types: [opened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  retarget-to-preview:
    if: >-
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref != 'preview'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            try {
              await github.rest.repos.getBranch({ owner, repo, branch: 'preview' });
            } catch (error) {
              if (error.status === 404) {
                core.warning('preview branch not found — skipping PR base retarget');
                return;
              }
              throw error;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              base: 'preview',
            });
